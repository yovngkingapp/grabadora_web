<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabadora de Aula Pro - Móvil</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --accent:#38bdf8; --danger:#ef4444; --success:#22c55e; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin:0; padding:15px; display:flex; justify-content:center; }
        .app-card { width:100%; max-width:600px; background:var(--card); border-radius:24px; padding:30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        h1 { text-align:center; font-size: 1.4rem; margin-bottom: 5px; color: var(--accent); }
        #status { text-align: center; font-size: 0.9rem; margin-bottom: 10px; font-weight: bold; }
        #timer { text-align: center; font-family: 'Courier New', monospace; font-size: 3rem; margin: 15px 0; color: #fff; }
        #output { height:300px; border:2px solid #334155; border-radius:16px; padding:15px; overflow-y:auto; background:#000; margin-bottom:20px; font-size: 1rem; line-height: 1.6; color: #cbd5e1; }
        .controls { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
        button { padding:20px; border:none; border-radius:16px; font-weight:bold; cursor: pointer; font-size: 1rem; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .btn-start { background:var(--success); color:#052e16; grid-column: span 2; }
        .btn-stop { background:var(--danger); color:#fff; grid-column: span 2; }
        .btn-download { background:var(--accent); color:#082f49; grid-column: span 2; margin-top:10px; }
        .footer-info { font-size: 0.75rem; color: #64748b; text-align: center; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>Transcripción & Audio</h1>
    <div id="status" style="color: #64748b;">DISPOSITIVO LISTO</div>
    <div id="timer">00:00:00</div>
    
    <div id="output">Presiona iniciar para grabar...</div>

    <div class="controls">
        <button id="startBtn" class="btn-start">INICIAR GRABACIÓN</button>
        <button id="stopBtn" class="btn-stop" disabled>FINALIZAR Y GUARDAR</button>
        <button id="downloadBtn" class="btn-download" style="display:none;">DESCARGAR ARCHIVOS (.zip)</button>
    </div>

    <div class="footer-info">
        <b>Tip para Jillpro:</b> En Android/iOS, mantén la pestaña visible y la pantalla encendida para que la transcripción no se detenga.
    </div>
</div>

<script>
const output = document.getElementById("output");
const status = document.getElementById("status");
const timer = document.getElementById("timer");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const downloadBtn = document.getElementById("downloadBtn");

let recognition = null;
let mediaRecorder, chunks = [];
let fullText = "";
let isRecording = false;
let startTime, timerId;

// 1. CONFIGURACIÓN DE VOZ (API del Navegador)
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = "es-CL";
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (e) => {
        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) {
                fullText += e.results[i][0].transcript + ". ";
            } else {
                interim += e.results[i][0].transcript;
            }
        }
        output.innerHTML = fullText + "<span style='color:#6366f1'>" + interim + "</span>";
        output.scrollTop = output.scrollHeight;
    };

    recognition.onend = () => { 
        if (isRecording) try { recognition.start(); } catch(e) {} 
    };
}

// 2. FUNCIÓN PRINCIPAL DE INICIO
async function startSession() {
    try {
        // SOLUCIÓN AL CONFLICTO: Pedir un solo stream para todo
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Configurar Grabadora (Audio puro)
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') 
                         ? 'audio/webm;codecs=opus' 
                         : 'audio/mp4'; // Fallback para iOS
        
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        chunks = [];
        mediaRecorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
        mediaRecorder.start();

        // Iniciar Transcripción con el mismo permiso
        if (recognition) {
            fullText = "";
            output.innerText = "";
            recognition.start();
        }

        isRecording = true;
        startTime = Date.now();
        timerId = setInterval(updateTimer, 1000);

        status.innerText = "● GRABANDO EN VIVO";
        status.style.color = "var(--success)";
        startBtn.disabled = true;
        stopBtn.disabled = false;
        downloadBtn.style.display = "none";

    } catch (err) {
        alert("Error: No se pudo acceder al micrófono. Revisa los permisos de tu celular.");
    }
}

function updateTimer() {
    const diff = new Date(Date.now() - startTime);
    timer.innerText = diff.toISOString().substr(11, 8);
}

// 3. FINALIZAR
stopBtn.onclick = () => {
    isRecording = false;
    if (mediaRecorder) {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop()); // Apaga el micro físicamente
    }
    if (recognition) recognition.stop();
    clearInterval(timerId);

    status.innerText = "GRABACIÓN COMPLETADA";
    status.style.color = "var(--text)";
    startBtn.disabled = false;
    stopBtn.disabled = true;
    downloadBtn.style.display = "block";
};

// 4. DESCARGA (AUDIO + PDF EN TIMES NEW ROMAN)
downloadBtn.onclick = async () => {
    const zip = new JSZip();
    const dateStr = new Date().toLocaleDateString().replace(/\//g, "-");
    const fileName = `Clase_${dateStr}`;

    // ARCHIVO DE AUDIO (Cambiamos extensión a .m4a o .mp3 para que el celular lo reconozca como música)
    const audioBlob = new Blob(chunks, { type: mediaRecorder.mimeType });
    const extension = mediaRecorder.mimeType.includes('mp4') ? '.m4a' : '.ogg';
    zip.file(fileName + extension, audioBlob);

    // ARCHIVO PDF (Estándar APA/Académico)
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    doc.setFont("times", "normal"); // Times New Roman
    doc.setFontSize(18);
    doc.text("Transcripción de Sesión Educativa", 20, 20);
    
    doc.setFontSize(12);
    doc.text(`Fecha: ${new Date().toLocaleString()}`, 20, 30);
    
    // Si la transcripción falló, usamos el texto del visor
    let textToSave = fullText || output.innerText;
    if (textToSave.length < 10) textToSave = "No se detectó transcripción de texto.";

    const lines = doc.splitTextToSize(textToSave, 170);
    doc.text(lines, 20, 45);

    const pdfBlob = doc.output("blob");
    zip.file(fileName + ".pdf", pdfBlob);

    // GENERAR ZIP FINAL
    const zipContent = await zip.generateAsync({ type: "blob" });
    const url = URL.createObjectURL(zipContent);
    const a = document.createElement("a");
    a.href = url;
    a.download = fileName + ".zip";
    a.click();
};

startBtn.onclick = startSession;
</script>
</body>
</html>
