<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabadora de Aula Pro - Fix Final</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
        window.pipeline = pipeline;
    </script>

    <style>
        :root {
            --bg:#0a0a0a; --card:#161616; --text:#f0f0f0;
            --accent:#3d5afe; --danger:#f44336; --success:#4caf50; --warning:#ff9800;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin:0; padding:15px; display:flex; justify-content:center; }
        .app-card { width:100%; max-width:800px; background:var(--card); border-radius:24px; padding:30px; border: 1px solid #333; }
        h1 { text-align:center; font-size: 1.4rem; color: var(--accent); }
        #status { text-align: center; margin-bottom: 10px; font-weight: bold; font-size: 0.9rem; }
        #timer { text-align: center; font-family: 'Courier New', monospace; font-size: 3rem; margin-bottom: 25px; color: #fff; }
        #output { height:300px; border:1px solid #444; border-radius:15px; padding:20px; overflow-y:auto; background:#000; margin-bottom:20px; line-height: 1.6; color: #ccc; font-size: 1rem; }
        .controls { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
        button { padding:20px; border:none; border-radius:16px; font-weight:bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        button:disabled { opacity: 0.2; }
        .btn-start { background:var(--success); color:#fff; grid-column:span 2; }
        .btn-pause { background:var(--warning); color:#000; }
        .btn-stop { background:var(--danger); color:#fff; }
        .btn-process { background:var(--accent); color:#fff; grid-column:span 2; margin-top: 10px; }
        .btn-download { background: #9c27b0; color:#fff; grid-column:span 2; margin-top: 10px; }
        .loader { display: none; text-align: center; color: var(--warning); margin-top: 15px; border: 1px dashed var(--warning); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>Grabadora de Aula (Literal Fix)</h1>
    <div id="status">SISTEMA INICIALIZADO</div>
    <div id="timer">00:00:00</div>
    <div id="output">El texto se generará al finalizar...</div>

    <div class="controls">
        <button id="startBtn" class="btn-start">INICIAR GRABACIÓN</button>
        <button id="pauseBtn" class="btn-pause" disabled>PAUSAR</button>
        <button id="stopBtn" class="btn-stop" disabled>DETENER</button>
        <button id="processBtn" class="btn-process" style="display:none;">GENERAR TEXTO (ESPAÑOL LITERAL)</button>
        <button id="downloadBtn" class="btn-download" style="display:none;">DESCARGAR ARCHIVOS</button>
    </div>
    <div id="loader" class="loader">Procesando audio... Mantén la pestaña abierta.</div>
</div>

<script>
/* global jspdf, JSZip */
let mediaRecorder, chunks = [], startTime, timerId, elapsed = 0;
let isPaused = false, audioUrl = "", fullText = "";

const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const stopBtn = document.getElementById('stopBtn');
const processBtn = document.getElementById('processBtn');
const downloadBtn = document.getElementById('downloadBtn');
const output = document.getElementById('output');
const timer = document.getElementById('timer');
const status = document.getElementById('status');
const loader = document.getElementById('loader');

startBtn.onclick = async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(chunks, { type: 'audio/wav' });
            audioUrl = URL.createObjectURL(audioBlob);
            processBtn.style.display = 'block';
        };
        mediaRecorder.start();
        startTime = Date.now();
        timerId = setInterval(updateTimer, 1000);
        startBtn.disabled = true; pauseBtn.disabled = false; stopBtn.disabled = false;
        status.innerText = "GRABANDO..."; status.style.color = "var(--success)";
    } catch (err) { alert("Permite el micrófono."); }
};

pauseBtn.onclick = () => {
    if (!isPaused) {
        mediaRecorder.pause(); isPaused = true; clearInterval(timerId);
        elapsed += Date.now() - startTime;
        pauseBtn.innerText = "REANUDAR"; status.innerText = "PAUSADO";
    } else {
        mediaRecorder.resume(); isPaused = false; startTime = Date.now();
        timerId = setInterval(updateTimer, 1000);
        pauseBtn.innerText = "PAUSAR"; status.innerText = "GRABANDO...";
    }
};

function updateTimer() {
    const currentElapsed = elapsed + (Date.now() - startTime);
    const d = new Date(currentElapsed);
    timer.innerText = d.toISOString().substr(11, 8);
}

stopBtn.onclick = () => {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    clearInterval(timerId);
    startBtn.disabled = false; pauseBtn.disabled = true; stopBtn.disabled = true;
    status.innerText = "GRABACIÓN LISTA PARA PROCESAR";
};

processBtn.onclick = async () => {
    loader.style.display = 'block';
    processBtn.disabled = true;
    status.innerText = "CARGANDO IA ESPAÑOLA...";

    try {
        // Usamos Whisper Small para mayor fidelidad en español
        const transcriber = await window.pipeline('automatic-speech-recognition', 'Xenova/whisper-small');
        
        status.innerText = "TRANSCRIBIENDO (MODO LITERAL)...";
        
        // AJUSTES DE SEGURIDAD CONTRA TRADUCCIÓN E INVENTOS
        const result = await transcriber(audioUrl, { 
            language: 'spanish',
            task: 'transcribe',
            return_timestamps: false,
            // Estos parámetros fuerzan a la IA a ser conservadora y no inventar
            generation_config: {
                max_new_tokens: 448,
                do_sample: false, // Desactiva la "creatividad"
                num_beams: 1,
                language: 'spanish'
            }
        });
        
        fullText = result.text;
        output.innerText = fullText;
        
        loader.style.display = 'none';
        status.innerText = "FINALIZADO";
        downloadBtn.style.display = 'block';
    } catch (err) {
        alert("Audio demasiado pesado para el celular.");
        loader.style.display = 'none';
        processBtn.disabled = false;
    }
};

downloadBtn.onclick = async () => {
    const zip = new JSZip();
    const ts = new Date().getTime();
    zip.file(`Audio_${ts}.m4a`, new Blob(chunks, { type: 'audio/mp4' }));
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFont("times", "normal");
    doc.text("Transcripción Literal de Clase", 20, 20);
    const lines = doc.splitTextToSize(fullText, 170);
    doc.text(lines, 20, 35);
    
    zip.file(`Transcripcion_${ts}.pdf`, doc.output("blob"));
    const zipBlob = await zip.generateAsync({ type: "blob" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(zipBlob);
    a.download = `Clase_${ts}.zip`;
    a.click();
};
</script>
</body>
</html>
