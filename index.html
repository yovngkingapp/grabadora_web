<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grabadora Aula Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
    --bg:#121212; --card:#1e1e1e; --text:#e0e0e0;
    --accent:#3d5afe; --danger:#ff5252; --success:#00e676; --warning:#ffea00;
}
body {
    font-family: sans-serif;
    background: var(--bg);
    color: var(--text);
    margin:0;
    padding:15px;
}
.app-card {
    max-width:800px;
    margin:auto;
    background:var(--card);
    padding:20px;
    border-radius:15px;
}
#output {
    height:300px;
    overflow:auto;
    background:#000;
    padding:10px;
    margin-bottom:10px;
}
button {
    padding:15px;
    border:none;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="app-card">
<h2>Grabadora + Transcripción</h2>

<div id="status">● Standby</div>
<div id="timer">00:00:00</div>

<div id="output"></div>

<button id="startBtn">INICIAR</button>
<button id="pauseBtn" disabled>PAUSAR</button>
<button id="stopBtn" disabled>DETENER</button>
<button id="downloadBtn" style="display:none;">DESCARGAR</button>

</div>

<script>

// ----------- VARIABLES -----------

let recognition = null;
let mediaRecorder;
let chunks = [];
let fullText = "";
let isRecording = false;
let isPaused = false;

let startTime, timerId, elapsed = 0;

const output = document.getElementById("output");

// ----------- SPEECH API (COMPATIBLE) -----------

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = "es-CL";
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (e) => {
        if (!isRecording || isPaused) return;

        let interim = "";

        for (let i = e.resultIndex; i < e.results.length; i++) {
            let text = e.results[i][0].transcript;

            if (e.results[i].isFinal) {
                fullText += text + ". ";
            } else {
                interim += text;
            }
        }

        output.innerHTML = fullText + "<span style='color:gray'>" + interim + "</span>";
        output.scrollTop = output.scrollHeight;
    };

    recognition.onend = () => {
        if (isRecording && !isPaused) {
            try { recognition.start(); } catch(e){}
        }
    };

} else {
    alert("Este dispositivo NO soporta transcripción automática.");
}

// ----------- GRABACIÓN -----------

async function startSession() {

    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });

    mediaRecorder = new MediaRecorder(stream);

    chunks = [];

    mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) chunks.push(e.data);
    };

    mediaRecorder.start();

    if (recognition) {
        try { recognition.start(); } catch(e){}
    }

    isRecording = true;
    isPaused = false;

    startTime = Date.now() - elapsed;

    timerId = setInterval(updateTimer,1000);

    document.getElementById("status").innerText = "● GRABANDO";
    startBtn.disabled = true;
    pauseBtn.disabled = false;
    stopBtn.disabled = false;
}

// ----------- TIMER -----------

function updateTimer(){
    if(isPaused) return;

    const diff = Date.now() - startTime;
    elapsed = diff;

    const h = String(Math.floor(diff/3600000)).padStart(2,"0");
    const m = String(Math.floor((diff%3600000)/60000)).padStart(2,"0");
    const s = String(Math.floor((diff%60000)/1000)).padStart(2,"0");

    document.getElementById("timer").innerText = `${h}:${m}:${s}`;
}

// ----------- PAUSA -----------

pauseBtn.onclick = () => {

    if(!isPaused){
        isPaused = true;
        mediaRecorder.pause();
        if(recognition) recognition.stop();
        pauseBtn.innerText = "REANUDAR";
    } else {
        isPaused = false;
        mediaRecorder.resume();
        if(recognition){
            try{ recognition.start(); } catch(e){}
        }
        startTime = Date.now() - elapsed;
        pauseBtn.innerText = "PAUSAR";
    }

};

// ----------- STOP -----------

stopBtn.onclick = () => {

    isRecording = false;

    mediaRecorder.stop();
    if(recognition) recognition.stop();

    clearInterval(timerId);

    document.getElementById("status").innerText = "FINALIZADO";
    downloadBtn.style.display = "block";

};

// ----------- DESCARGA -----------

downloadBtn.onclick = () => {

    const name = "Clase_" + Date.now();

    // AUDIO (compatible móvil)
    const blob = new Blob(chunks, { type:"audio/webm" });
    const url = URL.createObjectURL(blob);
    window.open(url);

    // PDF
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("Transcripción",10,10);

    const lines = doc.splitTextToSize(output.innerText,180);
    doc.text(lines,10,20);

    const pdfBlob = doc.output("blob");
    const pdfUrl = URL.createObjectURL(pdfBlob);

    setTimeout(()=> window.open(pdfUrl), 500);

};

// ----------- BOTONES -----------

startBtn.onclick = startSession;

</script>

</body>
</html>
