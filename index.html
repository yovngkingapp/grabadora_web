<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabadora Profesional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --b:#0f172a; --c:#1e293b; --t:#f8fafc; --a:#38bdf8; --d:#ef4444; --s:#22c55e; }
        body { font-family: system-ui, sans-serif; background: var(--b); color: var(--t); margin:0; padding:15px; display:flex; justify-content:center; }
        .card { width:100%; max-width:500px; background:var(--c); border-radius:20px; padding:25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align:center; font-size: 1.2rem; color: var(--a); }
        #timer { text-align: center; font-family: monospace; font-size: 3rem; margin: 20px 0; }
        #output { height:250px; border:1px solid #334155; border-radius:12px; padding:15px; overflow-y:auto; background:#000; margin-bottom:15px; font-size: 0.9rem; line-height: 1.5; }
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
        button { padding:18px; border:none; border-radius:12px; font-weight:bold; cursor: pointer; font-size: 1rem; }
        button:disabled { opacity: 0.3; }
        .btn-start { background:var(--s); color:#052e16; grid-column: span 2; }
        .btn-stop { background:var(--d); color:#fff; grid-column: span 2; }
        .btn-dl { background:var(--a); color:#082f49; grid-column: span 2; margin-top:10px; }
        .status { text-align: center; font-size: 0.8rem; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Grabadora de Aula</h1>
    <div id="timer">00:00:00</div>
    <div id="output">El texto aparecerá aquí...</div>
    
    <div class="grid">
        <button id="btnStart" class="btn-start">INICIAR</button>
        <button id="btnStop" class="btn-stop" disabled>DETENER</button>
        <button id="btnDl" class="btn-dl" style="display:none;">DESCARGAR ZIP</button>
    </div>
    <div id="msg" class="status">Listo para comenzar</div>
</div>

<script>
/* global jspdf, JSZip */
const btnStart = document.getElementById("btnStart");
const btnStop = document.getElementById("btnStop");
const btnDl = document.getElementById("btnDl");
const output = document.getElementById("output");
const timer = document.getElementById("timer");
const msg = document.getElementById("msg");

let recorder, chunks = [], recognition, isRecording = false, startTime, timerInterval;
let fullText = "";

// Configurar reconocimiento de voz
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRec) {
    recognition = new SpeechRec();
    recognition.lang = "es-CL";
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (e) => {
        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) {
                fullText += e.results[i][0].transcript + ". ";
            } else {
                interim += e.results[i][0].transcript;
            }
        }
        output.innerHTML = fullText + "<span style='color:#6366f1'>" + interim + "</span>";
        output.scrollTop = output.scrollHeight;
    };

    recognition.onend = () => { if (isRecording) recognition.start(); };
}

async function start() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Configurar Audio para que NO parezca video
        const options = { mimeType: 'audio/webm;codecs=opus' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) options.mimeType = 'audio/mp4';
        
        recorder = new MediaRecorder(stream, options);
        chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.start();

        if (recognition) {
            fullText = "";
            output.innerText = "";
            recognition.start();
        }

        isRecording = true;
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const d = new Date(Date.now() - startTime);
            timer.innerText = d.toISOString().substr(11, 8);
        }, 1000);

        btnStart.disabled = true;
        btnStop.disabled = false;
        btnDl.style.display = "none";
        msg.innerText = "Grabando...";
        msg.style.color = "#22c55e";

    } catch (err) {
        alert("Error: Activa el micrófono en tu navegador.");
    }
}

btnStop.onclick = () => {
    isRecording = false;
    if (recorder) {
        recorder.stop();
        recorder.stream.getTracks().forEach(t => t.stop());
    }
    if (recognition) recognition.stop();
    clearInterval(timerInterval);

    btnStart.disabled = false;
    btnStop.disabled = true;
    btnDl.style.display = "block";
    msg.innerText = "Grabación finalizada";
    msg.style.color = "#f8fafc";
};

btnDl.onclick = async () => {
    const zip = new JSZip();
    const ts = new Date().getTime();

    // Guardar Audio como archivo de sonido (.m4a es mejor para celulares)
    const audioBlob = new Blob(chunks, { type: recorder.mimeType });
    zip.file(`Audio_${ts}.m4a`, audioBlob);

    // Guardar PDF (Times New Roman)
    const { jsPDF } = jspdf;
    const doc = new jsPDF();
    doc.setFont("times", "normal");
    doc.setFontSize(16);
    doc.text("Transcripción de Sesión", 20, 20);
    doc.setFontSize(12);
    
    const content = fullText || output.innerText || "Sin texto detectado";
    const lines = doc.splitTextToSize(content, 170);
    doc.text(lines, 20, 35);

    const pdfBlob = doc.output("blob");
    zip.file(`Texto_${ts}.pdf`, pdfBlob);

    // Descargar ZIP
    const zipBlob = await zip.generateAsync({ type: "blob" });
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `Clase_${ts}.zip`;
    a.click();
};

btnStart.onclick = start;
</script>
</body>
</html>
