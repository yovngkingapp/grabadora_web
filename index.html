<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabadora de Aula Pro - Modo Oscuro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0;
            --accent: #3d5afe; --danger: #ff5252; --success: #00e676; --warning: #ffea00;
        }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 15px; display: flex; justify-content: center;
        }
        .app-card { width: 100%; max-width: 800px; background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h1 { font-size: 1.4rem; text-align: center; color: var(--text); border-bottom: 1px solid #333; padding-bottom: 15px; margin-top: 0; }
        #output { 
            height: 450px; border: 1px solid #333; border-radius: 12px; padding: 20px; 
            overflow-y: auto; background: #000; font-size: 18px; line-height: 1.6; 
            margin-bottom: 20px; color: #fff;
        }
        .stats { display: flex; justify-content: space-between; margin-bottom: 15px; font-family: monospace; font-size: 1.2rem; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { 
            padding: 20px; border: none; border-radius: 15px; font-weight: bold; 
            cursor: pointer; font-size: 1.1rem; transition: transform 0.1s, opacity 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        button:active { transform: scale(0.96); }
        .btn-start { background: var(--success); color: #000; grid-column: span 2; }
        .btn-pause { background: var(--warning); color: #000; }
        .btn-stop { background: var(--danger); color: white; }
        .btn-download { background: var(--accent); color: white; grid-column: span 2; margin-top: 15px; }
        .recording-pulse { color: var(--danger); animation: pulse 1s infinite; font-weight: bold; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
<div class="app-card">
    <h1>Grabadora de Aula & Transcripción</h1>
    <div class="stats">
        <div id="status">● Standby</div>
        <div id="timer">00:00:00</div>
    </div>
    <div id="output"></div>
    
    <div class="controls">
        <button id="startBtn" class="btn-start">⏺ INICIAR GRABACIÓN</button>
        <button id="pauseBtn" class="btn-pause" disabled>⏸ PAUSAR</button>
        <button id="stopBtn" class="btn-stop" disabled>⏹ DETENER</button>
        <button id="downloadBtn" class="btn-download" style="display:none;">📥 DESCARGAR CLASE (MP3 + PDF)</button>
    </div>
</div>

<script>
    // Reglas de normalización automáticas (sin iluminar)
    const normRules = {"po": "pues", "pa": "para", "na": "nada", "estai": "estás", "cachai": "entiendes", "ya po": "ya pues"};

    let recognition, mediaRecorder, chunks = [], fullText = localStorage.getItem('last_transcript_v3') || "";
    let isRecording = false, isPaused = false;
    let startTime, elapsedTime = 0, timerId, wakeLock = null;

    const output = document.getElementById('output');
    output.innerHTML = fullText;

    function getFileName() {
        const d = new Date();
        const day = String(d.getDate()).padStart(2, '0');
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const year = d.getFullYear();
        return `Clase_${day}-${month}-${year}`;
    }

    async function toggleWakeLock(on) {
        if ('wakeLock' in navigator) {
            try { if(on) wakeLock = await navigator.wakeLock.request('screen'); else if(wakeLock) wakeLock.release(); } catch(e){}
        }
    }

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'es-CL';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onresult = (e) => {
            if (!isRecording || isPaused) return;
            let interim = "";
            for (let i = e.resultIndex; i < e.results.length; i++) {
                let text = e.results[i][0].transcript;
                if (e.results[i].isFinal) {
                    fullText += processText(text) + ". ";
                    localStorage.setItem('last_transcript_v3', fullText);
                } else { interim += text; }
            }
            output.innerHTML = fullText + `<span style="color:#666">${interim}</span>`;
            output.scrollTop = output.scrollHeight;
        };
        recognition.onend = () => { if (isRecording && !isPaused) recognition.start(); };
    }

    async function startSession() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: { 
            echoCancellation: true, noiseSuppression: true, autoGainControl: true 
        }});
        
        mediaRecorder = new MediaRecorder(stream, { audioBitsPerSecond: 128000 });
        mediaRecorder.ondataavailable = (e) => { if(e.data.size > 0) chunks.push(e.data); };
        
        mediaRecorder.start(1000); 
        recognition.start();
        
        isRecording = true;
        isPaused = false;
        startTime = Date.now() - elapsedTime;
        timerId = setInterval(updateTimer, 1000);
        toggleWakeLock(true);

        document.getElementById('status').innerHTML = '<span class="recording-pulse">● GRABANDO</span>';
        document.getElementById('startBtn').disabled = true;
        document.getElementById('pauseBtn').disabled = false;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('downloadBtn').style.display = "none";
    }

    function processText(text) {
        let t = text.toLowerCase().trim();
        for (let [key, val] of Object.entries(normRules)) {
            t = t.replace(new RegExp(`\\b${key}\\b`, 'g'), val);
        }
        // Se eliminó el resaltado de palabras académicas
        return t.charAt(0).toUpperCase() + t.slice(1);
    }

    function updateTimer() {
        if (isPaused) return;
        const diff = Date.now() - startTime;
        elapsedTime = diff;
        const h = Math.floor(diff/3600000).toString().padStart(2,'0');
        const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
        const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
        document.getElementById('timer').innerText = `${h}:${m}:${s}`;
    }

    document.getElementById('pauseBtn').onclick = () => {
        if (!isPaused) {
            isPaused = true;
            recognition.stop();
            mediaRecorder.pause();
            document.getElementById('pauseBtn').innerText = "▶ REANUDAR";
            document.getElementById('status').innerText = "● PAUSADO";
        } else {
            isPaused = false;
            recognition.start();
            mediaRecorder.resume();
            startTime = Date.now() - elapsedTime; 
            document.getElementById('pauseBtn').innerText = "⏸ PAUSAR";
            document.getElementById('status').innerHTML = '<span class="recording-pulse">● GRABANDO</span>';
        }
    };

    document.getElementById('stopBtn').onclick = () => {
        isRecording = false;
        isPaused = false;
        recognition.stop();
        mediaRecorder.stop();
        clearInterval(timerId);
        toggleWakeLock(false);
        document.getElementById('status').innerText = "● FINALIZADO";
        document.getElementById('downloadBtn').style.display = "block";
        document.getElementById('pauseBtn').disabled = true;
        document.getElementById('stopBtn').disabled = true;
    };

    document.getElementById('downloadBtn').onclick = () => {
        const name = getFileName();
        
        // Descargar Audio
        const blob = new Blob(chunks, { type: 'audio/mp3' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${name}.mp3`;
        a.click();

        // Descargar PDF (Times New Roman 12)
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("times", "normal");
        doc.setFontSize(16);
        doc.text("Transcripción Académica de Clase", 20, 20);
        doc.setFontSize(10);
        doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 20, 28);
        doc.line(20, 32, 190, 32);
        
        doc.setFontSize(12);
        const lines = doc.splitTextToSize(output.innerText, 170);
        doc.text(lines, 20, 42);
        doc.save(`${name}.pdf`);
        
        if(confirm("¿Limpiar memoria para la siguiente clase?")) {
            localStorage.removeItem('last_transcript_v3');
            location.reload();
        } else {
            document.getElementById('startBtn').disabled = false;
            document.getElementById('downloadBtn').style.display = "none";
        }
    };

    document.getElementById('startBtn').onclick = startSession;
</script>
</body>
</html>
